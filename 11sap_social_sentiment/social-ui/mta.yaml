_schema-version: "3.2"
ID: social-ui
version: 0.0.1
modules:
- name: social-ui-destination-content
  type: com.sap.application.content
  requires:
  - name: social-ui-destination-service
    parameters:
      content-target: true
  - name: social-ui_html_repo_host
    parameters:
      service-key:
        name: social-ui_html_repo_host-key
  - name: uaa_social-ui
    parameters:
      service-key:
        name: uaa_social-ui-key
  parameters:
    content:
      instance:
        destinations:
        - Name: social_ui_social_ui_html_repo_host
          ServiceInstanceName: social-ui-html5-app-host-service
          ServiceKeyName: social-ui_html_repo_host-key
          sap.cloud.service: social-ui
        - Authentication: OAuth2UserTokenExchange
          Name: social_ui_uaa_social_ui
          ServiceInstanceName: social-ui-xsuaa-service
          ServiceKeyName: uaa_social-ui-key
          sap.cloud.service: social-ui
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: social-ui-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: social-ui_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - socialui.zip
      name: socialui
      target-path: resources/
- name: socialui
  type: html5
  path: socialui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: social-ui-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: social-ui-destination-service
    service-plan: lite
- name: social-ui_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: social-ui-html5-app-host-service
    service-plan: app-host
- name: uaa_social-ui
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: social-ui-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
